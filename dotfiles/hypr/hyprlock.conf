# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 70
    font_family = Rajdhani SemiBold
    position = 0%, 6%
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, .80)
    font_size = 19
    font_family = Rajdhani
    position = 0%, -1%
    halign = center
    valign = center
}
###CUADRO DE ATRAS
