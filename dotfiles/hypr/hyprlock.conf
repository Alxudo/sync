# INPUT FIELD
input-field {
    monitor =
    size = 15%, 6%
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    rounding = 10
    check_color = rgba(216, 222, 233, 0.8)
    capslock_color = rgba(0, 166, 178, 0.8)
    fail_color = rgba(229, 0, 0, 0.9)
    inner_color = rgba(216, 222, 233, 0.8)
    font_color = rgba(12, 12, 12, 0.9)
    fade_on_empty = false
    font_family = Rajdhani SemiBold
    placeholder_text = <i>Password... </i>
    fail_text = <span foreground="##d8dee9"><i>Auth Failed </i></span>
    hide_input = false
    position = 0%, -9%
    halign = center
    valign = center
}
#BATTERY BACKGROUND
shape {
    monitor =
    size = 7%, 7%
    color = rgba(12, 12, 12, 0.9)
    rounding = 15
    border_size = 0
    position = 12%, 20%
    halign = center
    valign = center
}

#BATTERY
label {
    monitor =
    text = cmd[update:1000] sh -c "printf \"   %s%%\" \"$(cat /sys/class/power_supply/BAT0/capacity)\""
    color = rgba(255, 255, 255, 0.9)
    outline_thickness = 0
    font_size = 16
    font_family = Rajdhani SemiBold
    position = 12%, 20%
    halign = center
    valign = center
}

#REBOOT BACKGROUND
shape {
    monitor =
    size = 5%, 6%
    color = rgba(12, 12, 12, 0.9)
    rounding = 10
    border_size = 0
    position = 0%, -20%
    halign = center
    valign = center
}
# Reboot
label {
    monitor =
    text = 
    #text = <span>  </span>
    color = rgba(255, 255, 255, 0.6)
    font_size = 25
    onclick = reboot
    position = 0%, -20%
    halign = center
    valign = center
}

#POWER OFF BACKGROUND
shape {
    monitor =
    size = 5%, 6%
    color = rgba(12, 12, 12, 0.9)
    rounding = 10
    border_size = 0
    position = 10%, -20%
    halign = center
    valign = center
}
# Power off
label {
    monitor =
    text = ⏻
    color = rgba(255, 255, 255, 0.6)
    font_size = 28
    onclick = poweroff
    position = 10%, -20%
    halign = center
    valign = center
}

#SUSPEND BACKGROUND
